name: Security checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit-and-secrets:
    name: Pre-commit and secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit

      - name: Run pre-commit hooks on changed files
        env:
          SKIP: gitleaks-protect
        run: |
          set -euo pipefail
          HEAD_SHA="${{ github.sha }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -z "$BASE_SHA" ] || printf '%s' "$BASE_SHA" | grep -Eq '^0+$'; then
            if git rev-parse --verify "${HEAD_SHA}^" >/dev/null 2>&1; then
              BASE_SHA="$(git rev-parse "${HEAD_SHA}^")"
              pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --show-diff-on-failure
            else
              pre-commit run --all-files --show-diff-on-failure
            fi
          else
            pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --show-diff-on-failure
          fi

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C "$HOME/bin" gitleaks
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Run gitleaks current-tree scan
        run: gitleaks detect --source . --no-git --redact --verbose
