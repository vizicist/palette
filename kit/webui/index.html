<!DOCTYPE html>
<html>
<head>
    <title>Palette Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="app-title"><span id="app-title-text">Unfinished Rituals Resequencer</span></header>
    <nav id="ritual-nav">
        <button class="ritual-nav-btn" id="btn-nav-space" data-screen="space">Palette</button>
        <button class="ritual-nav-btn" id="btn-nav-sigil" data-screen="sigil">Sequencer</button>
    </nav>

    <section id="sigil-screen" class="hidden">
        <div class="sigil-band sigil-band-top" aria-hidden="true">
            <img src="sigil-chaos.png" alt="" data-sigil="chaos">
            <img src="sigil-directive.png" alt="" data-sigil="directive">
        </div>
        <main class="sigil-sequencer" id="sigil-sequencer"></main>
        <div class="sigil-band sigil-band-bottom" aria-hidden="true">
            <img src="sigil-oracle.png" alt="" data-sigil="oracle">
            <img src="sigil-sacred.png" alt="" data-sigil="sacred">
        </div>
        <div class="tempo-control">
            <label for="tempo-slider">Tempo</label>
            <input id="tempo-slider" type="range" min="60" max="180" step="1" value="120">
            <output id="tempo-value" for="tempo-slider">120 BPM</output>
        </div>
    </section>

    <!-- Attract mode overlay -->
    <div id="attract-overlay" class="hidden">
        <img src="sppro_attractscreen.png" alt="Space Palette Pro" class="attract-image">
    </div>

    <!-- Reset modal overlay -->
    <div id="restart-overlay" class="modal-overlay hidden">
        <div id="restart-modal">
            <div id="restart-buttons">
                <button class="restart-btn modal-button" data-action="complete">Reset<br>Completely</button>
                <button class="restart-btn modal-button" data-action="audio">Reset<br>Audio</button>
                <button class="restart-btn modal-button" data-action="visuals">Reset<br>Visuals</button>
                <button class="restart-btn modal-button restart-cancel" data-action="cancel">Cancel</button>
            </div>
        </div>
        <div id="restart-message" class="hidden">
            <div class="restart-message-text">The Space Palette will be<br>reset in a few seconds.</div>
        </div>
    </div>

    <!-- Help overlay -->
    <div id="help-overlay" class="hidden">
        <iframe src="helpscreen.html" frameborder="0"></iframe>
    </div>

    <!-- Record options modal overlay -->
    <div id="record-overlay" class="modal-overlay hidden">
        <div id="record-modal">
            <div id="record-buttons">
                <button class="record-opt-btn modal-button" data-action="start">Start<br>Recording</button>
                <button class="record-opt-btn modal-button" data-action="list">List<br>Recordings</button>
                <button class="record-opt-btn modal-button record-cancel" data-action="cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Recordings list page overlay -->
    <div id="recordings-overlay" class="page-overlay hidden">
        <div id="recordings-page">
            <header id="recordings-header">
                <h1>Recordings</h1>
                <button id="recordings-back" class="modal-button" type="button">Back</button>
            </header>
            <div id="recordings-list"></div>
        </div>
    </div>

    <!-- Video player overlay -->
    <div id="player-overlay" class="page-overlay hidden">
        <div id="player-page">
            <header id="player-header">
                <h1 id="player-title"></h1>
                <button id="player-back" class="modal-button" type="button">Back</button>
            </header>
            <div id="player-stage">
                <video id="player-video" controls playsinline></video>
            </div>
            <input id="player-seek" type="range" min="0" max="1000" value="0">
        </div>
    </div>

    <header id="title-bar" class="hidden">
        <h1>Space Palette Pro</h1>
    </header>

    <!-- Theme Selector: pro2 only. Switches the quad preset directory. -->
    <nav id="theme-selector" aria-label="Theme"></nav>

    <!-- Advanced mode: category tabs -->
    <nav id="category-tabs">
        <button class="tab" data-category="global">Global</button>
        <span class="tab-sep">/</span>
        <button class="tab active" data-category="quad">Quad</button>
        <span class="tab-sep">/</span>
        <button class="tab" data-category="patch">Patch</button>
        <span class="tab-sep">=</span>
        <button class="tab" data-category="misc">Misc</button>
        <span class="tab-sep">+</span>
        <button class="tab" data-category="sound">Sound</button>
        <span class="tab-sep">+</span>
        <button class="tab" data-category="visual">Visual</button>
        <span class="tab-sep">+</span>
        <button class="tab" data-category="effect">Effect</button>
    </nav>

    <div id="main-container" class="hidden">
        <section id="palette-pad-stage" aria-label="Palette pads">
            <div class="palette-pad-layout">
                <div class="palette-pad palette-pad-a sample" data-pad="A">
                    <span class="palette-pad-title">CHAOS</span>
                    <img class="palette-pad-sigil" src="sigil-chaos.png" alt="">
                    <button class="palette-pad-route" type="button" aria-label="Mode: Words">
                        <span class="palette-pad-mode-choice palette-pad-mode-prophecy">Words</span>
                        <span class="palette-pad-mode-arrow" aria-hidden="true">
                            <span class="palette-pad-mode-arrow-head palette-pad-mode-arrow-head-left"></span>
                            <span class="palette-pad-mode-arrow-line"></span>
                            <span class="palette-pad-mode-arrow-head palette-pad-mode-arrow-head-right"></span>
                        </span>
                        <span class="palette-pad-mode-choice palette-pad-mode-oscillation">Music</span>
                    </button>
                </div>
                <div class="palette-pad palette-pad-d sample" data-pad="D">
                    <span class="palette-pad-title">DIRECTIVE</span>
                    <img class="palette-pad-sigil" src="sigil-directive.png" alt="">
                    <button class="palette-pad-route" type="button" aria-label="Mode: Words">
                        <span class="palette-pad-mode-choice palette-pad-mode-prophecy">Words</span>
                        <span class="palette-pad-mode-arrow" aria-hidden="true">
                            <span class="palette-pad-mode-arrow-head palette-pad-mode-arrow-head-left"></span>
                            <span class="palette-pad-mode-arrow-line"></span>
                            <span class="palette-pad-mode-arrow-head palette-pad-mode-arrow-head-right"></span>
                        </span>
                        <span class="palette-pad-mode-choice palette-pad-mode-oscillation">Music</span>
                    </button>
                </div>
                <div class="palette-pad palette-pad-b sample" data-pad="B">
                    <span class="palette-pad-title">ORACLE</span>
                    <img class="palette-pad-sigil" src="sigil-oracle.png" alt="">
                    <button class="palette-pad-route" type="button" aria-label="Mode: Words">
                        <span class="palette-pad-mode-choice palette-pad-mode-prophecy">Words</span>
                        <span class="palette-pad-mode-arrow" aria-hidden="true">
                            <span class="palette-pad-mode-arrow-head palette-pad-mode-arrow-head-left"></span>
                            <span class="palette-pad-mode-arrow-line"></span>
                            <span class="palette-pad-mode-arrow-head palette-pad-mode-arrow-head-right"></span>
                        </span>
                        <span class="palette-pad-mode-choice palette-pad-mode-oscillation">Music</span>
                    </button>
                </div>
                <div class="palette-pad palette-pad-c sample" data-pad="C">
                    <span class="palette-pad-title">SACRED</span>
                    <img class="palette-pad-sigil" src="sigil-sacred.png" alt="">
                    <button class="palette-pad-route" type="button" aria-label="Mode: Words">
                        <span class="palette-pad-mode-choice palette-pad-mode-prophecy">Words</span>
                        <span class="palette-pad-mode-arrow" aria-hidden="true">
                            <span class="palette-pad-mode-arrow-head palette-pad-mode-arrow-head-left"></span>
                            <span class="palette-pad-mode-arrow-line"></span>
                            <span class="palette-pad-mode-arrow-head palette-pad-mode-arrow-head-right"></span>
                        </span>
                        <span class="palette-pad-mode-choice palette-pad-mode-oscillation">Music</span>
                    </button>
                </div>
            </div>
        </section>

        <section id="sample-playback-controls-panel" aria-label="Words controls">
            <h2 id="sample-playback-controls-title">Words Control</h2>
            <div class="palette-pad-controls" aria-label="Words controls">
                <label class="pad-control" for="sample-playback-quant">
                    <span class="pad-control-title">Quantize</span>
                    <select id="sample-playback-quant">
                        <option value="0" selected>Off</option>
                        <option value="0.25">16th</option>
                        <option value="0.5">8th</option>
                        <option value="1">Quarter</option>
                    </select>
                </label>
                <label class="pad-control" for="sample-playback-words">
                    <span class="pad-control-title">Words<br>Per Chunk</span>
                    <select id="sample-playback-words">
                        <option value="1">1</option>
                        <option value="2" selected>2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                        <option value="13">13</option>
                        <option value="14">14</option>
                        <option value="15">15</option>
                        <option value="16">16</option>
                    </select>
                </label>
                <button class="pad-control-button" id="sample-playback-newset" type="button">Receive New Words</button>
            </div>
        </section>

        <section id="preset-selector-panel" aria-labelledby="preset-selector-title">
            <h2 id="preset-selector-title">Music Control</h2>
            <main id="preset-grid"></main>
        </section>

        <!-- Advanced mode: patch selector -->
        <div id="patch-selector">
            <div class="patch-grid">
                <div class="patch-row">
                    <button class="patch-btn" data-patch="A">A</button>
                    <button class="patch-btn active" data-patch="*">*</button>
                    <button class="patch-btn" data-patch="D">D</button>
                </div>
                <div class="patch-row patch-row-bottom">
                    <button class="patch-btn" data-patch="B">B</button>
                    <button class="patch-btn" data-patch="C">C</button>
                </div>
            </div>
        </div>

        <footer id="controls">
            <button id="btn-complete-reset">RESET</button>
            <button id="btn-record" style="display:none">RECORD</button>
            <button id="btn-help">HELP</button>
        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
